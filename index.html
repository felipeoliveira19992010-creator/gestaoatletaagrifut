<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="app-version" content="2026-06-20-loja-1" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Sistema de gestão de atletas do Itajaí Agrifut."
    />
    <title>Itajaí Agrifut</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700;800;900&display=swap"
      rel="stylesheet"
    />
    <script type="importmap">
      {
        "imports": {
          "react": "https://esm.sh/react@18.3.1",
          "react-dom/client": "https://esm.sh/react-dom@18.3.1/client"
        }
      }
    </script>
    <script src="https://unpkg.com/@babel/standalone@7.26.7/babel.min.js"></script>
    <style>
      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        background: #f1f5f9;
        font-family: "Roboto", system-ui, -apple-system, BlinkMacSystemFont,
          "Segoe UI", sans-serif;
      }

      button,
      input,
      select,
      textarea {
        font: inherit;
      }

      .initial-loader {
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        background: linear-gradient(135deg, #1b2a4a, #2d4a7a);
        color: white;
        text-align: center;
        padding: 24px;
      }

      .initial-loader img {
        width: 86px;
        height: 86px;
        object-fit: contain;
      }

      .initial-loader strong {
        display: block;
        margin-top: 14px;
        font-size: 18px;
        font-weight: 900;
      }

      .initial-loader span {
        display: block;
        margin-top: 4px;
        color: #cbd5e1;
        font-size: 13px;
      }
    </style>
  </head>
  <body>
    <div id="root">
      <div class="initial-loader">
        <div>
          <img src="./logo.png" alt="Itajaí Agrifut" />
          <strong>Carregando sistema</strong>
          <span>Sincronizando dados do Agrifut...</span>
        </div>
      </div>
    </div>
    <script
      type="text/babel"
      data-type="module"
      data-presets="typescript,react"
